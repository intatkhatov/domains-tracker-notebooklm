<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Гферма — Domains Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f0;
    color: #1a1a1a;
    font-size: 14px;
  }

  header {
    background: #1a1a1a;
    color: #fff;
    padding: 12px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  header h1 { font-size: 14px; font-weight: 600; }

  .back-link {
    color: #bbb;
    text-decoration: none;
    font-size: 12.5px;
    padding: 6px 12px;
    border: 1px solid #3a3a3a;
    border-radius: 6px;
  }

  .back-link:hover { color: #fff; border-color: #555; }

  .btn-add {
    margin-left: auto;
    padding: 7px 14px;
    background: #2e7d32;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12.5px;
    font-weight: 600;
  }

  .btn-add:hover { background: #256728; }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px 60px; }

  .table-wrap {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 10px;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead {
    background: #1a1a1a;
    color: #fff;
  }

  thead th {
    padding: 10px 10px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    white-space: nowrap;
  }

  tbody tr { border-bottom: 1px solid #f0f0f0; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafaf8; }

  tbody td {
    padding: 9px 10px;
    vertical-align: middle;
  }

  .td-num { width: 48px; color: #888; font-size: 12px; }
  .td-name { min-width: 90px; font-weight: 500; }
  .td-day { width: 48px; }
  .td-month { width: 80px; }
  .td-year { width: 64px; }
  .td-gender { width: 100px; }
  .td-email { min-width: 130px; font-family: 'SF Mono', Menlo, monospace; font-size: 12px; }
  .td-phone { min-width: 110px; }
  .td-password { min-width: 100px; }
  .td-lost { width: 64px; text-align: center; }
  .td-reason { min-width: 100px; color: #888; font-size: 12px; }
  .td-actions { width: 70px; white-space: nowrap; position: sticky; right: 0; background: #fff; box-shadow: -2px 0 4px rgba(0,0,0,0.06); }
  thead .td-actions { background: #1a1a1a; }

  .badge-lost {
    display: inline-block;
    background: #ffebee;
    color: #c62828;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
  }

  .badge-ok {
    display: inline-block;
    background: #e8f5e9;
    color: #2e7d32;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
  }

  .row-green { background: #f0fff4; }
  .row-red { background: #fff5f5; }

  .td-limit { min-width: 180px; width: 180px; font-size: 12px; }

  .btn-limit {
    padding: 4px 9px;
    border-radius: 5px;
    border: 1px solid #ddd;
    background: #fff;
    cursor: pointer;
    font-size: 11.5px;
    color: #c62828;
  }
  .btn-limit:hover { background: #ffebee; }

  .limit-info { font-size: 11.5px; color: #555; line-height: 1.5; }
  .limit-days { font-weight: 700; color: #c62828; }
  .limit-date { color: #888; }
  .limit-done { color: #2e7d32; font-weight: 700; }

  .limit-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 300; align-items: center; justify-content: center; }
  .limit-modal-overlay.open { display: flex; }
  .limit-modal { background: #fff; border-radius: 10px; padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 8px 40px rgba(0,0,0,0.18); }
  .limit-modal-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  .limit-modal-text { font-size: 13.5px; color: #555; margin-bottom: 20px; line-height: 1.6; }
  .limit-modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-limit-reset { padding: 8px 18px; background: #c62828; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-limit-reset:hover { background: #b71c1c; }

  .password-cell {
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 12px;
    letter-spacing: 1px;
    color: #aaa;
    cursor: pointer;
    user-select: none;
    min-width: 120px;
    width: 120px;
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .password-cell.revealed { color: #1a1a1a; }

  .copy-cell {
    cursor: pointer;
    user-select: none;
  }

  .copy-cell:hover {
    text-decoration: none;
    opacity: 1;
  }

  .btn-edit, .btn-delete {
    padding: 4px 9px;
    border-radius: 5px;
    border: 1px solid #ddd;
    background: #fff;
    cursor: pointer;
    font-size: 11.5px;
    color: #555;
  }

  .btn-edit:hover { background: #f0f0f0; }
  .btn-delete:hover { background: #ffebee; color: #c62828; border-color: #ffcdd2; }

  .empty-state {
    text-align: center;
    color: #aaa;
    padding: 60px;
    font-size: 13px;
  }

  /* Модалка */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: #fff;
    border-radius: 10px;
    padding: 24px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  }

  .modal-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-close {
    background: none;
    border: none;
    font-size: 20px;
    color: #aaa;
    cursor: pointer;
    line-height: 1;
    padding: 0 0 0 10px;
  }

  .modal-close:hover { color: #1a1a1a; }

  .form-row {
    margin-bottom: 14px;
  }

  .form-row label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #555;
    margin-bottom: 5px;
  }

  .form-row input[type="text"],
  .form-row input[type="email"],
  .form-row input[type="number"],
  .form-row input[type="password"],
  .form-row select,
  .form-row textarea {
    width: 100%;
    padding: 8px 11px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
  }

  .form-row input:focus,
  .form-row select:focus,
  .form-row textarea:focus {
    outline: none;
    border-color: #1a1a1a;
  }

  .form-row textarea { resize: vertical; min-height: 60px; }

  .form-row-check {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }

  .form-row-check label { font-size: 13px; cursor: pointer; }

  .form-row-check input[type="checkbox"] {
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  .form-row-inline {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .btn-cancel {
    padding: 8px 18px;
    border: 1px solid #ddd;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    color: #555;
  }

  .btn-cancel:hover { background: #f5f5f5; }

  .btn-save {
    padding: 8px 20px;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }

  .btn-save:hover { background: #333; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1a1a1a;
    color: #fff;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 300;
    pointer-events: none;
  }

  .toast.show { opacity: 1; }

  .confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }

  .confirm-overlay.open { display: flex; }

  .confirm-box {
    background: #fff;
    border-radius: 10px;
    padding: 24px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  }

  .confirm-box p { font-size: 14px; margin-bottom: 20px; color: #333; }

  .confirm-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-confirm-delete {
    padding: 8px 18px;
    background: #c62828;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }

  .btn-confirm-delete:hover { background: #b71c1c; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="back-link">← Назад</a>
    <h1>Гферма</h1>
    <button class="btn-add" id="btn-add">+ Добавить</button>
  </div>
</header>

<div class="container">
  <div class="table-wrap">
    <table id="farm-table">
      <thead>
        <tr>
          <th class="td-num">№</th>
          <th class="td-name">Имя</th>
          <th class="td-day">День</th>
          <th class="td-month">Месяц</th>
          <th class="td-year">Год</th>
          <th class="td-gender">Пол</th>
          <th class="td-email">Эл. почта</th>
          <th class="td-phone">Тел. подтверждения</th>
          <th class="td-phone">Тел. в аккаунте</th>
          <th class="td-password">Пароль</th>
          <th class="td-lost">Утрачен</th>
          <th class="td-reason">Причина утраты</th>
          <th class="td-limit">Лимит</th>
          <th class="td-actions">Действия</th>
        </tr>
      </thead>
      <tbody id="farm-tbody"></tbody>
    </table>
    <div class="empty-state" id="empty-state">Нет записей. Нажми «+ Добавить».</div>
  </div>
</div>

<!-- Модалка добавления/редактирования -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title"><span id="modal-title">Добавить запись</span><button class="modal-close" id="btn-modal-close">✕</button></div>

    <div class="form-row">
      <label>Имя</label>
      <input type="text" id="f-name" placeholder="Любое имя или псевдоним">
    </div>

    <div class="form-row-inline">
      <div class="form-row" style="margin-bottom:0">
        <label>День</label>
        <input type="number" id="f-day" min="1" max="31" placeholder="1–31">
      </div>
      <div class="form-row" style="margin-bottom:0">
        <label>Месяц</label>
        <select id="f-month">
          <option value="">—</option>
          <option>Янв</option><option>Фев</option><option>Мар</option>
          <option>Апр</option><option>Май</option><option>Июн</option>
          <option>Июл</option><option>Авг</option><option>Сен</option>
          <option>Окт</option><option>Ноя</option><option>Дек</option>
        </select>
      </div>
      <div class="form-row" style="margin-bottom:0">
        <label>Год</label>
        <input type="number" id="f-year" min="1900" max="2100" placeholder="2026">
      </div>
    </div>

    <div class="form-row" style="margin-top:14px">
      <label>Пол</label>
      <select id="f-gender">
        <option>Не указан</option>
        <option>Мужской</option>
        <option>Женский</option>
        <option>Другое</option>
      </select>
    </div>

    <div class="form-row">
      <label>Эл. почта</label>
      <input type="email" id="f-email" placeholder="example@mail.com">
    </div>

    <div class="form-row">
      <label>Телефон для подтверждения</label>
      <input type="text" id="f-phone-confirm" placeholder="+7 999 123 45 67">
    </div>

    <div class="form-row">
      <label>Телефон в аккаунте</label>
      <input type="text" id="f-phone-account" placeholder="+7 999 123 45 67">
    </div>

    <div class="form-row">
      <label>Пароль</label>
      <input type="text" id="f-password" placeholder="Пароль">
    </div>

    <div class="form-row-check">
      <input type="checkbox" id="f-lost">
      <label for="f-lost">Утрачен</label>
    </div>

    <div class="form-row">
      <label>Причина утраты</label>
      <textarea id="f-reason" placeholder="Необязательно"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel">Отмена</button>
      <button class="btn-save" id="btn-save">Сохранить</button>
    </div>
  </div>
</div>

<!-- Подтверждение удаления -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <p>Удалить эту запись? Действие необратимо.</p>
    <div class="confirm-actions">
      <button class="btn-cancel" id="btn-confirm-cancel">Отмена</button>
      <button class="btn-confirm-delete" id="btn-confirm-delete">Удалить</button>
    </div>
  </div>
</div>

<div class="limit-modal-overlay" id="limit-modal-overlay">
  <div class="limit-modal">
    <div class="limit-modal-title">⚠️ Лимит уже активен</div>
    <div class="limit-modal-text" id="limit-modal-text"></div>
    <div class="limit-modal-actions">
      <button class="btn-cancel" id="btn-limit-modal-cancel">Закрыть</button>
      <button class="btn-limit-reset" id="btn-limit-modal-reset">Сбросить лимит</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:5051/api/farm';
let rows = [];
let editId = null;
let deleteId = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadRows() {
  try {
    const res = await fetch(API);
    rows = await res.json();
    renderTable();
  } catch(e) {
    showToast('Ошибка загрузки данных');
  }
}

function renderTable() {
  const tbody = document.getElementById('farm-tbody');
  const empty = document.getElementById('empty-state');

  if (rows.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  const LIMIT_DAYS = 35;

  function getLimitInfo(limitStartedAt) {
    if (!limitStartedAt) return null;
    const start = new Date(limitStartedAt);
    const resetDate = new Date(start.getTime() + LIMIT_DAYS * 24 * 60 * 60 * 1000);
    const now = new Date();
    const daysLeft = Math.ceil((resetDate - now) / (24 * 60 * 60 * 1000));
    return { daysLeft, resetDate, done: daysLeft <= 0 };
  }

  function formatLimitDate(date) {
    return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
  }

  tbody.innerHTML = rows.map(r => {
    const info = getLimitInfo(r.limit_started_at);
    const rowClass = !r.limit_started_at || (info && info.done) ? 'row-green' : 'row-red';
    let limitCell = '';
    if (!r.limit_started_at || (info && info.done)) {
      limitCell = `<button class="btn-limit" data-id="${r.id}">Лимит</button>`;
    } else {
      limitCell = `<div class="limit-info">
        <span class="limit-days">${info.daysLeft} дн.</span><br>
        <span class="limit-date">до ${formatLimitDate(info.resetDate)}</span><br>
        <button class="btn-limit" data-id="${r.id}" style="margin-top:4px">⚠ Лимит</button>
      </div>`;
    }
    return `<tr class="${rowClass}">
      <td class="td-num">${escHtml(String(r.number ?? ''))}</td>
      <td class="td-name">${escHtml(r.name)}</td>
      <td class="td-day">${r.day ?? ''}</td>
      <td class="td-month">${escHtml(r.month)}</td>
      <td class="td-year">${r.year ?? ''}</td>
      <td class="td-gender">${escHtml(r.gender)}</td>
      <td class="td-email password-cell" data-pwd="${escHtml(r.email)}" data-copy="${escHtml(r.email)}" title="Нажми чтобы показать и скопировать">••••••••</td>
      <td class="td-phone">${r.phone_confirm || "—"}</td>
      <td class="td-phone">${r.phone_account || "—"}</td>
      <td class="td-password password-cell" data-pwd="${escHtml(r.password)}" title="Нажми чтобы показать">••••••••</td>
      <td class="td-lost">${r.lost ? '<span class="badge-lost">Да</span>' : '<span class="badge-ok">Нет</span>'}</td>
      <td class="td-reason">${escHtml(r.loss_reason)}</td>
      <td class="td-limit">${limitCell}</td>
      <td class="td-actions">
        <button class="btn-edit" data-id="${r.id}">✏️</button>
        <button class="btn-delete" data-id="${r.id}">🗑</button>
      </td>
    </tr>`;
  }).join('');
}

// Показать/скрыть пароль по клику
document.getElementById('farm-tbody').addEventListener('click', e => {
  const copyCell = e.target.closest(".copy-cell");
  if (copyCell) {
    const text = copyCell.dataset.copy || "";
    navigator.clipboard.writeText(text).then(() => showToast("Скопировано!"));
    return;
  }

  const cell = e.target.closest('.password-cell');
  if (cell) {
    if (cell.classList.contains('revealed')) {
      cell.textContent = '••••••••';
      cell.classList.remove('revealed');
    } else {
      cell.textContent = cell.dataset.pwd || '—';
      cell.classList.add('revealed');
      navigator.clipboard.writeText(cell.dataset.pwd || '').then(() => showToast('Скопировано!'));
    }
    return;
  }

  const editBtn = e.target.closest('.btn-edit');
  if (editBtn) {
    openEdit(parseInt(editBtn.dataset.id));
    return;
  }

  const delBtn = e.target.closest('.btn-delete');
  if (delBtn) {
    openConfirmDelete(parseInt(delBtn.dataset.id));
  }
});

function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editId = null;
}

function clearForm() {
  ['f-name','f-email','f-phone-confirm','f-phone-account','f-password','f-reason'].forEach(id => document.getElementById(id).value = '');
  ['f-day','f-year'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-month').value = '';
  document.getElementById('f-gender').value = 'Не указан';
  document.getElementById('f-lost').checked = false;
}

document.getElementById('btn-add').addEventListener('click', () => {
  clearForm();
  editId = null;
  document.getElementById('modal-title').textContent = 'Добавить запись';
  openModal();
});

function openEdit(id) {
  const r = rows.find(x => x.id === id);
  if (!r) return;
  editId = id;
  document.getElementById('modal-title').textContent = 'Редактировать запись';
  document.getElementById('f-name').value = r.name || '';
  document.getElementById('f-day').value = r.day || '';
  document.getElementById('f-month').value = r.month || '';
  document.getElementById('f-year').value = r.year || '';
  document.getElementById('f-gender').value = r.gender || 'Не указан';
  document.getElementById('f-email').value = r.email || '';
  document.getElementById('f-phone-confirm').value = r.phone_confirm || '';
  document.getElementById('f-phone-account').value = r.phone_account || '';
  document.getElementById('f-password').value = r.password || '';
  document.getElementById('f-lost').checked = !!r.lost;
  document.getElementById('f-reason').value = r.loss_reason || '';
  openModal();
}

document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('btn-modal-close').addEventListener('click', closeModal);
// закрытие по клику вне модалки отключено

document.getElementById('btn-save').addEventListener('click', async () => {
  const currentNumber = editId ? (rows.find(x => x.id === editId) || {}).number : null;
  const payload = {
    number: currentNumber,
    name: document.getElementById('f-name').value.trim(),
    day: parseInt(document.getElementById('f-day').value) || null,
    month: document.getElementById('f-month').value,
    year: parseInt(document.getElementById('f-year').value) || null,
    gender: document.getElementById('f-gender').value,
    email: document.getElementById('f-email').value.trim(),
    phone_confirm: document.getElementById('f-phone-confirm').value.trim(),
    phone_account: document.getElementById('f-phone-account').value.trim(),
    password: document.getElementById('f-password').value,
    lost: document.getElementById('f-lost').checked,
    loss_reason: document.getElementById('f-reason').value.trim()
  };

  try {
    if (editId) {
      await fetch(`${API}/${editId}`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      showToast('Запись обновлена');
    } else {
      await fetch(API, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      showToast('Запись добавлена');
    }
    closeModal();

  }
});

// ЛИМИТ
let limitModalRowId = null;
document.getElementById('farm-tbody').addEventListener('click', async e => {
  const limitBtn = e.target.closest('.btn-limit');
  if (!limitBtn) return;
  const id = parseInt(limitBtn.dataset.id);
  const r = rows.find(x => x.id === id);
  if (!r) return;
  const res = await fetch(`http://localhost:5051/api/farm/${id}/limit`, { method: 'PATCH' });
  const data = await res.json();
  if (data.status === 'already_set') {
    limitModalRowId = id;
    const start = new Date(data.limit_started_at);
    const resetDate = new Date(start.getTime() + 35 * 24 * 60 * 60 * 1000);
    const daysLeft = Math.ceil((resetDate - new Date()) / (24 * 60 * 60 * 1000));
    document.getElementById('limit-modal-text').innerHTML =
      `Лимит был активирован <b>${start.toLocaleDateString('ru-RU')}</b>.<br>` +
      `Сброс произойдёт <b>${resetDate.toLocaleDateString('ru-RU')}</b> — через <b>${daysLeft} дн.</b><br><br>` +
      `Нажми «Сбросить лимит» чтобы начать отсчёт заново.`;
    document.getElementById('limit-modal-overlay').classList.add('open');
  } else {
    showToast('Лимит активирован');
    loadRows();
  }
});
document.getElementById('btn-limit-modal-cancel').addEventListener('click', () => {
  document.getElementById('limit-modal-overlay').classList.remove('open');
  limitModalRowId = null;
});
document.getElementById('btn-limit-modal-reset').addEventListener('click', async () => {
  if (!limitModalRowId) return;
  await fetch(`http://localhost:5051/api/farm/${limitModalRowId}/limit/reset`, { method: 'PATCH' });
  document.getElementById('limit-modal-overlay').classList.remove('open');
  limitModalRowId = null;
  showToast('Лимит сброшен');
  loadRows();
});

loadRows();
