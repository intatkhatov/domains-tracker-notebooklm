<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domains Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; font-size: 14px; }
  header { background: #1a1a1a; color: #fff; padding: 10px 20px; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; gap: 12px; max-width: 720px; margin: 0 auto; width: 100%; }
  .search-wrap { position: relative; flex: 1; max-width: 440px; }
  #search { width: 100%; padding: 7px 28px 7px 11px; border: 1px solid #3a3a3a; border-radius: 6px; font-size: 13px; background: #2a2a2a; color: #fff; }
  #search::placeholder { color: #888; }
  #search:focus { outline: none; border-color: #666; }
  .search-clear { display: none; position: absolute; right: 6px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; border: none; border-radius: 50%; background: #444; color: #ccc; font-size: 12px; cursor: pointer; align-items: center; justify-content: center; }
  .search-clear.visible { display: flex; }
  .search-clear:hover { background: #555; color: #fff; }
  .btn-filters-text { padding: 7px 14px; background: #2a2a2a; color: #ccc; border: 1px solid #3a3a3a; border-radius: 6px; cursor: pointer; font-size: 12.5px; white-space: nowrap; flex-shrink: 0; }
  .btn-filters-text:hover { background: #333; color: #fff; }
  .btn-filters-text.active { background: #3a3a3a; color: #fff; border-color: #666; }
  .btn-header { width: 34px; height: 34px; border: 1px solid #3a3a3a; border-radius: 6px; background: #2a2a2a; color: #ccc; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .btn-header:hover { background: #333; color: #fff; }
  .btn-header.active { background: #3a3a3a; color: #fff; border-color: #666; }
  .burger-wrap { position: relative; flex-shrink: 0; }
  .burger-menu { display: none; position: absolute; top: 40px; left: 0; background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); min-width: 180px; z-index: 150; overflow: hidden; }
  .burger-menu.open { display: block; }
  .burger-menu a { display: block; padding: 10px 16px; font-size: 13px; color: #1a1a1a; text-decoration: none; }
  .burger-menu a:hover { background: #f5f5f5; }
  .btn-add { padding: 7px 14px; background: #fff; color: #1a1a1a; border: none; border-radius: 6px; cursor: pointer; font-size: 12.5px; white-space: nowrap; font-weight: 600; flex-shrink: 0; }
  .btn-add:hover { background: #eee; }

  .layout { display: flex; justify-content: center; align-items: flex-start; padding: 20px 16px 40px; margin-top: 54px; }

  .sidebar { display: none; position: fixed; top: 54px; bottom: 0; left: 10px; width: 280px; z-index: 50; padding-top: 20px; }
  .sidebar.open { display: block; }
  .sidebar-card { width: 260px; background: #fff; border: 1px solid #e8e8e8; border-radius: 8px; padding: 14px 16px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); margin: 0 12px; }
  .sidebar-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .sidebar-title { font-size: 11px; color: #888; }
  .btn-sidebar-close { width: 20px; height: 20px; border: none; background: #f0f0f0; border-radius: 50%; color: #888; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .btn-sidebar-close:hover { background: #e0e0e0; color: #1a1a1a; }

  .filter-section { margin-bottom: 16px; }
  .filter-section:last-child { margin-bottom: 0; }
  .filter-section-label { font-size: 11.5px; font-weight: 600; color: #555; margin-bottom: 8px; }
  .filter-chip-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .filter-chip { padding: 5px 10px; border: 1px solid #ddd; border-radius: 6px; background: #fafafa; cursor: pointer; font-size: 11.5px; color: #666; transition: all 0.15s; user-select: none; white-space: nowrap; }
  .filter-chip:hover { background: #f0f0f0; }
  .filter-chip.active { background: #555; color: #fff; border-color: #555; }
  .filter-chip.active.processed-chip { background: #2e7d32; color: #fff; border-color: #2e7d32; }
  .filter-chip.active.listened-chip { background: #1565c0; color: #fff; border-color: #1565c0; }
  .chip-count { font-size: 10px; opacity: 0.65; margin-left: 3px; }
  .rating-filter-display { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #555; margin-bottom: 10px; font-weight: 600; }
  .range-slider-wrap { position: relative; height: 28px; margin: 4px 0; cursor: pointer; }
  .range-slider-track { position: absolute; top: 50%; left: 0; right: 0; height: 4px; background: #e0e0e0; border-radius: 2px; transform: translateY(-50%); }
  .range-slider-fill { position: absolute; top: 50%; height: 4px; background: #1565c0; border-radius: 2px; transform: translateY(-50%); }
  .range-thumb { position: absolute; top: 50%; width: 16px; height: 16px; background: #fff; border: 2px solid #1565c0; border-radius: 50%; transform: translate(-50%, -50%); cursor: grab; z-index: 2; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
  .range-thumb:active { cursor: grabbing; box-shadow: 0 0 0 4px rgba(21,101,192,0.15); }
  .slider-labels { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; margin-top: 2px; }
  .btn-reset-filters { width: 100%; padding: 7px 0; border: 1px solid #e0b0b0; border-radius: 6px; background: #fff; cursor: pointer; font-size: 11.5px; color: #c62828; margin-top: 16px; }
  .btn-reset-filters:hover { background: #ffebee; }

  .content { width: 720px; flex-shrink: 0; }
  .source-row { background: #fff; border: 1px solid #e8e8e8; border-radius: 7px; margin-bottom: 8px; padding: 10px 12px 12px; transition: background 0.4s, border-color 0.4s; }
  .source-top { display: flex; align-items: flex-start; gap: 10px; }
  .source-row.processed { background: #f9fffe; border-color: #d8f0e8; }
  .source-row.just-added { background: #fff9e6; border-color: #ffe082; }
  .source-flags { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; padding-top: 2px; }
  .flag-line { display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .flag-icon { font-size: 13px; opacity: 0.35; }
  .flag-line.on .flag-icon { opacity: 1; }
  .toggle-checkbox { width: 14px; height: 14px; cursor: pointer; }
  .toggle-checkbox.processed-cb { accent-color: #2e7d32; }
  .toggle-checkbox.listened-cb { accent-color: #1565c0; }
  .toggle-checkbox.relisten-cb { accent-color: #e65100; }
  .source-body { flex: 1; min-width: 0; }
  .source-short { font-weight: 600; font-size: 13px; color: #1a1a1a; margin-bottom: 2px; }
  .source-row.processed .source-short { color: #2e7d32; }
  .source-citation { font-size: 11.5px; color: #777; line-height: 1.4; margin-bottom: 5px; margin-right: 40px; }
  .source-tags { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; margin-bottom: 6px; }
  .tag { font-size: 9.5px; padding: 1px 6px; border-radius: 4px; background: #f0f0f0; color: #888; }
  .tag.lost { background: #fff3e0; color: #e65100; }
  .tag.translation { background: #e8eaf6; color: #3949ab; }
  .source-date { font-size: 9.5px; color: #bbb; margin-top: 2px; margin-bottom: 10px; }
  .source-notebook { margin-bottom: 8px; }
  .source-notebook a { font-size: 10.5px; color: #1a73e8; text-decoration: none; }
  .source-notebook a:hover { text-decoration: underline; }
  .source-actions { display: flex; flex-direction: row; gap: 4px; flex-wrap: wrap; margin-top: 4px; flex-shrink: 0; width: 220px; justify-content: flex-end; }
  .source-actions .btn-copy { width: 66px; text-align: center; }
  .btn-copy, .btn-icon { padding: 5px 9px; border: 1px solid #e0e0e0; border-radius: 4px; background: #fafafa; cursor: pointer; font-size: 11px; color: #555; white-space: nowrap; text-align: center; }
  .btn-copy:hover { background: #e8f5e9; border-color: #a5d6a7; color: #2e7d32; }
  .btn-copy.copied { background: #e8f5e9; color: #2e7d32; border-color: #a5d6a7; }
  .btn-icon:hover { background: #f0f0f0; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 10px; padding: 24px; width: 540px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .modal h2 { font-size: 16px; }
  .btn-modal-close { width: 26px; height: 26px; border: none; background: #f0f0f0; border-radius: 50%; color: #666; font-size: 14px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .btn-modal-close:hover { background: #e0e0e0; color: #1a1a1a; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; font-weight: 500; }
  .form-group input[type="text"], .form-group textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: inherit; resize: vertical; }
  .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #1a1a1a; }
  .form-group textarea { min-height: 80px; }
  .form-check { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 9px 12px; background: #f7f7f5; border-radius: 6px; cursor: pointer; }
  .form-check input[type="checkbox"] { width: 15px; height: 15px; flex-shrink: 0; cursor: pointer; margin: 0; }
  .form-check span { line-height: 15px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px; }
  .btn-cancel { padding: 8px 16px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; }
  .btn-save { padding: 8px 16px; background: #1a1a1a; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .btn-save:hover { background: #333; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: #fff; padding: 10px 18px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.2s; z-index: 300; pointer-events: none; }
  .toast.show { opacity: 1; }
  .empty { text-align: center; color: #aaa; padding: 40px; font-size: 13px; }
  .rating-row { display: flex; align-items: center; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
  .rating-label { font-size: 11px; color: #888; margin-right: 4px; }
  .rating-btn { width: 22px; height: 22px; padding: 0; font-size: 10px; border: 1px solid #e0e0e0; border-radius: 4px; background: #fff; color: #888; cursor: pointer; }
  .rating-btn:hover { background: #f0f0f0; }
  .rating-btn.selected { background: #e3f2fd; color: #1565c0; border-color: #90caf9; font-weight: 700; }
  .source-bottom-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-top: 8px; padding-left: 38px; }
  .comment-zone-wrap { flex: 1; min-width: 0; }
  .comment-display { font-size: 11.5px; color: #999; text-decoration: underline; text-decoration-style: dashed; text-decoration-color: #bbb; text-underline-offset: 4px; cursor: pointer; line-height: 1.6; margin-right: 40px; display: inline-block; }
  .comment-display.has-text { color: #666; }
  .comment-display:hover { color: #333; }
  .comment-edit-zone { flex: 1; min-width: 0; }
  .comment-textarea { width: 100%; min-height: 50px; padding: 6px 8px; font-size: 11.5px; border: 1px solid #ccc; border-radius: 5px; resize: vertical; font-family: inherit; margin-bottom: 6px; }
  .comment-actions { display: flex; gap: 6px; }
  .btn-comment-save, .btn-comment-cancel, .btn-comment-delete { padding: 4px 10px; font-size: 11px; border: 1px solid #e0e0e0; border-radius: 4px; background: #fff; cursor: pointer; }
  .btn-comment-save:hover { background: #e8f5e9; border-color: #a5d6a7; color: #2e7d32; }
  .btn-comment-delete:hover { background: #ffebee; border-color: #ffcdd2; color: #c62828; }
  .btn-comment-cancel:hover { background: #f0f0f0; }
  .manage-actions { display: flex; gap: 4px; flex-shrink: 0; visibility: hidden; }
  .source-row:hover .manage-actions { visibility: visible; }
  .btn-manage { padding: 4px 8px; font-size: 11px; border: 1px solid #e0e0e0; border-radius: 4px; background: #fafafa; cursor: pointer; white-space: nowrap; color: #555; }
  .btn-manage:hover { background: #f0f0f0; }
  .btn-manage.danger:hover { background: #ffebee; color: #c62828; border-color: #ffcdd2; }
  .dup-warning { display: none; background: #fff8e1; border: 1px solid #ffca28; border-radius: 8px; padding: 12px 14px; margin-top: 10px; margin-bottom: 14px; font-size: 12.5px; }
  .dup-warning.visible { display: block; }
  .dup-warning-title { font-weight: 700; color: #7a5b00; margin-bottom: 8px; }
  .dup-match { background: #fff; border: 1px solid #ffe082; border-radius: 6px; padding: 8px 10px; margin-bottom: 6px; }
  .dup-match:last-child { margin-bottom: 0; }
  .dup-match-score { display: inline-block; background: #ff9800; color: #fff; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 4px; margin-right: 6px; }
  .dup-match-name { font-weight: 600; color: #1a1a1a; }
  .dup-match-citation { color: #777; font-size: 11px; margin-top: 3px; line-height: 1.4; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <button class="btn-filters-text" id="btn-filters-header" type="button">Фильтры</button>
    <div class="burger-wrap">
      <button class="btn-header" id="btn-burger" type="button" title="Меню">☰</button>
      <div class="burger-menu" id="burger-menu">
        <a href="/import.html">Импорт источников</a>
      </div>
    </div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Поиск по источникам…">
      <button class="search-clear" id="search-clear" type="button">✕</button>
    </div>
    <button class="btn-add" id="btn-add-source">+ Источник</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-card">
      <div class="sidebar-header-row">
        <div class="sidebar-title"><span id="filter-count"></span></div>
        <button class="btn-sidebar-close" id="btn-sidebar-close" type="button">✕</button>
      </div>
      <div id="filters-mount"></div>
      <button class="btn-reset-filters" id="btn-reset-filters">Сбросить все</button>
    </div>
  </aside>
  <div class="content">
    <div id="sources-list"></div>
    <div class="empty" id="empty" style="display:none">Ничего не найдено</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modal-title"></h2>
      <button class="btn-modal-close" id="modal-close-x" type="button" title="Закрыть">✕</button>
    </div>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Отмена</button>
      <button class="btn-save" id="modal-save">Сохранить</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:5051/api';
const PROMPT_TEXT = 'Подготовь аудиопересказ в формате "глубокое погружение". Твоя целевая аудитория — это современные, взрослые, русские люди из городов-миллионников с образованием не более 9 классов. Не используй термины, англицизмы и английские слова. Объясняй на примерах, через метафоры, образы, просто, так чтобы даже дети поняли. Не рассказывай биографию автора, историю его жизни, личные обстоятельства или подробности написания работы — это не нужно. Если упоминание автора неизбежно, ограничься одним предложением и сразу переходи к содержанию. Мне нужен не текст, а именно — аудиопересказ в формате "глубокое погружение" в студии.';

let allSources = [];
let sourcesById = {};
let currentSearch = '';
let justAddedId = null;

// SIDEBAR
const SIDEBAR_KEY = 'dt_sidebar_open';

function setSidebarOpen(open) {
  const sidebar = document.getElementById('sidebar');
  const btnF = document.getElementById('btn-filters-header');
  if (open) {
    sidebar.classList.add('open');
    if (btnF) btnF.classList.add('active');
  } else {
    sidebar.classList.remove('open');
    if (btnF) btnF.classList.remove('active');
  }
  localStorage.setItem(SIDEBAR_KEY, String(open));
}

function initSidebar() {
  const stored = localStorage.getItem(SIDEBAR_KEY);
  const isOpen = stored === null ? true : stored === 'true';
  setSidebarOpen(isOpen);
}

document.getElementById('btn-sidebar-close').addEventListener('click', () => {
  setSidebarOpen(false);
});

document.getElementById('btn-sidebar-close').addEventListener('click', () => {
  setSidebarOpen(false);
});

document.getElementById('btn-filters-header').addEventListener('click', () => {
  setSidebarOpen(!document.getElementById('sidebar').classList.contains('open'));
});

// FILTER REGISTRY
const FilterRegistry = {
  filters: [],
  state: {},

  register(filter) { this.filters.push(filter); this.state[filter.id] = filter.getDefaultState(); },

  resetAll() { this.filters.forEach(f => { this.state[f.id] = f.getDefaultState(); }); },

  applyAll(sources) {
    return sources.filter(s => this.filters.every(f => f.apply(s, this.state[f.id])));
  },

  countFor(filterId, value) {
    if (!allSources.length) return '';
    const n = allSources.filter(s => {
      return this.filters.every(f => {
        const st = f.id === filterId ? value : this.state[f.id];
        return f.apply(s, st);
      });
    }).length;
    return n;
  },

  renderAll() {
    const mount = document.getElementById('filters-mount');
    if (!mount) return;
    mount.innerHTML = this.filters.map(f => f.render(this.state[f.id], this)).join('');
    this.filters.forEach(f => { if (f.afterRender) f.afterRender(this); });
  }
};

// Фильтр: Обработано
FilterRegistry.register({
  id: 'processed',
  getDefaultState: () => 'any',
  apply: (s, state) => {
    if (state === 'yes') return !!s.processed;
    if (state === 'no') return !s.processed;
    return true;
  },
  render: (state, reg) => `
    <div class="filter-section">
      <div class="filter-section-label">✅ Обработано</div>
      <div class="filter-chip-group">
        <button class="filter-chip processed-chip ${state==='any'?'active':''}" data-filter="processed" data-value="any">любое<span class="chip-count">${reg ? reg.countFor('processed','any') : ''}</span></button>
        <button class="filter-chip processed-chip ${state==='yes'?'active':''}" data-filter="processed" data-value="yes">да<span class="chip-count">${reg ? reg.countFor('processed','yes') : ''}</span></button>
        <button class="filter-chip processed-chip ${state==='no'?'active':''}" data-filter="processed" data-value="no">нет<span class="chip-count">${reg ? reg.countFor('processed','no') : ''}</span></button>
      </div>
    </div>`
});

// Фильтр: Прослушано
FilterRegistry.register({
  id: 'listened',
  getDefaultState: () => 'any',
  apply: (s, state) => {
    if (state === 'yes') return !!s.listened;
    if (state === 'no') return !s.listened;
    return true;
  },
  render: (state, reg) => `
    <div class="filter-section">
      <div class="filter-section-label">🎧 Прослушано</div>
      <div class="filter-chip-group">
        <button class="filter-chip listened-chip ${state==='any'?'active':''}" data-filter="listened" data-value="any">любое<span class="chip-count">${reg ? reg.countFor('listened','any') : ''}</span></button>
        <button class="filter-chip listened-chip ${state==='yes'?'active':''}" data-filter="listened" data-value="yes">да<span class="chip-count">${reg ? reg.countFor('listened','yes') : ''}</span></button>
        <button class="filter-chip listened-chip ${state==='no'?'active':''}" data-filter="listened" data-value="no">нет<span class="chip-count">${reg ? reg.countFor('listened','no') : ''}</span></button>
      </div>
    </div>`
});

// Фильтр: Аудиопересказ
FilterRegistry.register({
  id: 'notebook',
  getDefaultState: () => 'any',
  apply: (s, state) => {
    if (state === 'yes') return !!(s.notebook_url && s.notebook_url.trim());
    if (state === 'no') return !(s.notebook_url && s.notebook_url.trim());
    return true;
  },
  render: (state, reg) => `
    <div class="filter-section">
      <div class="filter-section-label">🎙️ Аудиопересказ</div>
      <div class="filter-chip-group">
        <button class="filter-chip ${state==='any'?'active':''}" data-filter="notebook" data-value="any">любое<span class="chip-count">${reg ? reg.countFor('notebook','any') : ''}</span></button>
        <button class="filter-chip ${state==='yes'?'active':''}" data-filter="notebook" data-value="yes">да<span class="chip-count">${reg ? reg.countFor('notebook','yes') : ''}</span></button>
        <button class="filter-chip ${state==='no'?'active':''}" data-filter="notebook" data-value="no">нет<span class="chip-count">${reg ? reg.countFor('notebook','no') : ''}</span></button>
      </div>
    </div>`
});

// Фильтр: Комментарий
FilterRegistry.register({
  id: 'comment',
  getDefaultState: () => 'any',
  apply: (s, state) => {
    if (state === 'yes') return !!(s.comment && s.comment.trim());
    if (state === 'no') return !(s.comment && s.comment.trim());
    return true;
  },
  render: (state, reg) => `
    <div class="filter-section">
      <div class="filter-section-label">💬 Комментарий</div>
      <div class="filter-chip-group">
        <button class="filter-chip ${state==='any'?'active':''}" data-filter="comment" data-value="any">любое<span class="chip-count">${reg ? reg.countFor('comment','any') : ''}</span></button>
        <button class="filter-chip ${state==='yes'?'active':''}" data-filter="comment" data-value="yes">да<span class="chip-count">${reg ? reg.countFor('comment','yes') : ''}</span></button>
        <button class="filter-chip ${state==='no'?'active':''}" data-filter="comment" data-value="no">нет<span class="chip-count">${reg ? reg.countFor('comment','no') : ''}</span></button>
      </div>
    </div>`
});

// Фильтр: Оценка
FilterRegistry.register({
  id: 'rating',
  getDefaultState: () => ({ min: 0, max: 10 }),
  apply: (s, state) => {
    if (!s.rating) return state.min === 0;
    return s.rating >= state.min && s.rating <= state.max;
  },
  render: (state) => `
    <div class="filter-section">
      <div class="filter-section-label">⭐ Оценка</div>
      <div class="rating-filter-display">
        <span>от <b id="rmin-label">${state.min}</b></span>
        <span>до <b id="rmax-label">${state.max}</b></span>
      </div>
      <div class="range-slider-wrap" id="range-slider-wrap">
        <div class="range-slider-track"></div>
        <div class="range-slider-fill" id="range-slider-fill"></div>
        <div class="range-thumb" id="range-thumb-min"></div>
        <div class="range-thumb" id="range-thumb-max"></div>
      </div>
      <div class="slider-labels"><span>0</span><span>10</span></div>
    </div>`,
  afterRender: (registry) => {
    const wrap = document.getElementById('range-slider-wrap');
    if (!wrap) return;
    const fill = document.getElementById('range-slider-fill');
    const thumbMin = document.getElementById('range-thumb-min');
    const thumbMax = document.getElementById('range-thumb-max');
    const minLabel = document.getElementById('rmin-label');
    const maxLabel = document.getElementById('rmax-label');
    const MIN = 0, MAX = 10;
    let st = registry.state.rating;

    function pct(val) { return (val - MIN) / (MAX - MIN) * 100; }

    function updateUI() {
      thumbMin.style.left = pct(st.min) + '%';
      thumbMax.style.left = pct(st.max) + '%';
      fill.style.left = pct(st.min) + '%';
      fill.style.width = (pct(st.max) - pct(st.min)) + '%';
      minLabel.textContent = st.min;
      maxLabel.textContent = st.max;
    }

    function startDrag(isMin) {
      const rect = wrap.getBoundingClientRect();
      function onMove(e) {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let ratio = (clientX - rect.left) / rect.width;
        ratio = Math.max(0, Math.min(1, ratio));
        let val = Math.round(MIN + ratio * (MAX - MIN));
        if (isMin) { st.min = Math.min(val, st.max); }
        else { st.max = Math.max(val, st.min); }
        registry.state.rating = { ...st };
        updateUI();
        renderSources();
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
      document.addEventListener('touchmove', onMove);
      document.addEventListener('touchend', onUp);
    }

    thumbMin.addEventListener('mousedown', e => { e.preventDefault(); startDrag(true); });
    thumbMax.addEventListener('mousedown', e => { e.preventDefault(); startDrag(false); });
    thumbMin.addEventListener('touchstart', e => { e.preventDefault(); startDrag(true); });
    thumbMax.addEventListener('touchstart', e => { e.preventDefault(); startDrag(false); });
    updateUI();
  }
});

document.getElementById('filters-mount').addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip[data-filter]');
  if (!chip) return;
  const filterId = chip.dataset.filter;
  const value = chip.dataset.value;
  FilterRegistry.state[filterId] = value;
  FilterRegistry.renderAll();
  renderSources();
});

document.getElementById('btn-reset-filters').addEventListener('click', () => {
  FilterRegistry.resetAll();
  FilterRegistry.renderAll();
  renderSources();
});

// CORE
async function load() {
  const res = await fetch(`${API}/domains`);
  const domains = await res.json();
  allSources = domains.flatMap(d => d.sources);
  allSources.sort((a, b) => parseInt(a.source_id) - parseInt(b.source_id));
  sourcesById = {};
  allSources.forEach(s => sourcesById[s.id] = s);
  FilterRegistry.renderAll();
  renderSources();
}

function renderSources() {
  const list = document.getElementById('sources-list');
  const empty = document.getElementById('empty');
  const q = currentSearch.toLowerCase();
  let sources = allSources;
  if (q) sources = sources.filter(s => s.short_name.toLowerCase().includes(q) || s.citation.toLowerCase().includes(q));
  sources = FilterRegistry.applyAll(sources);
  const countEl = document.getElementById('filter-count');
  if (countEl) countEl.textContent = sources.length + ' из ' + allSources.length;
  if (sources.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.innerHTML = sources.map(s => renderSource(s)).join('');
  if (justAddedId) {
    const el = document.getElementById(`source-row-${justAddedId}`);
    if (el) { el.scrollIntoView({behavior:'smooth',block:'center'}); setTimeout(()=>el.classList.remove('just-added'),2500); }
    justAddedId = null;
  }
}

function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(isoString) {
  if (!isoString) return '';
  try {
    const d = new Date(isoString);
    return `добавлено ${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  } catch(e) { return ''; }
}

function renderRatingButtons(s) {
  let html = `<span class="rating-label">Оценка</span>`;
  for (let i=1;i<=10;i++) html += `<button class="rating-btn ${s.rating===i?'selected':''} js-rating" data-id="${s.id}" data-value="${i}">${i}</button>`;
  return html;
}

function renderCommentZone(s) {
  if (s.comment && s.comment.trim()) return `<span class="comment-display has-text js-comment-open" data-id="${s.id}">${escHtml(s.comment)}</span>`;
  return `<span class="comment-display js-comment-open" data-id="${s.id}">+ добавить комментарий</span>`;
}

function renderSource(s) {
  const lostTag = s.original_lost
    ? `<span class="tag lost">оригинал утрачен · ${escHtml(s.original_language)}</span><span class="tag translation">перевод: ${escHtml(s.authoritative_translation_language)}</span>`
    : `<span class="tag">${escHtml(s.original_language)}</span>`;
  const notebookHtml = s.notebook_url ? `<div class="source-notebook"><a href="${escHtml(s.notebook_url)}" target="_blank">🎙️ Аудиопересказ</a></div>` : '';
  const justAddedClass = s.id === justAddedId ? 'just-added' : '';
  return `
    <div class="source-row ${s.processed?'processed':''} ${justAddedClass}" id="source-row-${s.id}" data-id="${s.id}">
      <div class="source-top">
        <div class="source-flags">
          <label class="flag-line ${s.processed?'on':''}"><span class="flag-icon">✅</span><input type="checkbox" class="toggle-checkbox processed-cb js-toggle" data-field="processed" data-id="${s.id}" ${s.processed?'checked':''}></label>
          <label class="flag-line ${s.listened?'on':''}"><span class="flag-icon">🎧</span><input type="checkbox" class="toggle-checkbox listened-cb js-toggle" data-field="listened" data-id="${s.id}" ${s.listened?'checked':''}}>
          </label>
          <label class="flag-line ${s.relisten?'on':''}">
            <span class="flag-icon">🔁</span>
            <input type="checkbox" class="toggle-checkbox relisten-cb js-toggle" data-field="relisten" data-id="${s.id}" ${s.relisten?'checked':''}}></label>
        </div>
        <div class="source-body">
          <div class="source-short">${escHtml(s.short_name)}</div>
          <div class="source-citation">${escHtml(s.citation)}</div>
          <div class="source-tags">${lostTag}</div>
          ${notebookHtml}
          <div class="source-date">${formatDate(s.created_at)}</div>
          <div class="rating-row">${renderRatingButtons(s)}</div>
        </div>
        <div class="source-actions">
          <button class="btn-copy js-copy" data-id="${s.id}" data-kind="citation">Источник</button>
          <button class="btn-copy js-copy" data-id="${s.id}" data-kind="short_name">ID</button>
          <button class="btn-copy js-copy" data-id="${s.id}" data-kind="prompt">Промт</button>
        </div>
      </div>
      <div class="source-bottom-row" id="bottom-row-${s.id}">
        <div class="comment-zone-wrap">${renderCommentZone(s)}</div>
        <div class="manage-actions">
          <button class="btn-manage js-edit" data-id="${s.id}">✎ Редакт.</button>
          <button class="btn-manage js-notebook" data-id="${s.id}">🔗 Ссылка</button>
          <button class="btn-manage danger js-delete" data-id="${s.id}">✕ Удалить</button>
        </div>
      </div>
    </div>`;
}

function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent; btn.textContent = '✓'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1200);
  }).catch(() => showToast('Не удалось скопировать'));
}

async function toggleField(id, field, val) {
  await fetch(`${API}/sources/${id}/${field}`, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({[field]:val})});
  const s = sourcesById[id]; if (s) s[field] = val;
  renderSources();
  showToast(val ? 'Отмечено' : 'Отметка снята');
}

function openNotebookPrompt(id) {
  const s = sourcesById[id];
  const url = prompt('Ссылка на NotebookLM (оставь пустой чтобы удалить):', s.notebook_url||'');
  if (url===null) return;
  fetch(`${API}/sources/${id}/notebook`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({notebook_url:url.trim()})}).then(()=>{load();showToast('Ссылка обновлена');});
}

async function deleteSourceById(id) {
  if (!confirm('Удалить источник?')) return;
  await fetch(`${API}/sources/${id}`,{method:'DELETE'});
  allSources = allSources.filter(s=>s.id!==id); delete sourcesById[id];
  renderSources(); showToast('Источник удалён');
}

function openModal(title, bodyHtml, onSave) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-save').onclick = onSave;
  document.getElementById('modal-overlay').classList.add('open');
  if (typeof attachDuplicateCheckListener === 'function') attachDuplicateCheckListener();
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function sourceFormHtml(s={}) {
  return `
    <div class="form-group"><label>Краткое название (номер добавится автоматически)</label><input id="f-short-name" type="text" placeholder="например: Асанга. Махаянасанграха." value="${escHtml(s.short_name||'')}"></div>
    <div class="form-group"><label>Полная библиографическая ссылка</label><textarea id="f-citation">${escHtml(s.citation||'')}</textarea><div class="dup-warning" id="dup-warning"></div></div>
    <div class="form-group"><label>Язык оригинала</label><input id="f-lang" type="text" value="${escHtml(s.original_language||'')}"></div>
    <div class="form-group"><label class="form-check"><input type="checkbox" id="f-lost" ${s.original_lost?'checked':''}><span>Оригинал утрачен</span></label></div>
    <div class="form-group"><label>Язык авторитетного перевода</label><input id="f-translation-lang" type="text" value="${escHtml(s.authoritative_translation_language||'')}"></div>
    <div class="form-group"><label>Ссылка на NotebookLM</label><input id="f-notebook-url" type="text" value="${escHtml(s.notebook_url||'')}"></div>`;
}

function openAddSource() {
  openModal('Новый источник', sourceFormHtml(), async () => {
    const res = await fetch(`${API}/sources`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({domain_rank:1,short_name:document.getElementById('f-short-name').value,citation:document.getElementById('f-citation').value,original_language:document.getElementById('f-lang').value,original_lost:document.getElementById('f-lost').checked,authoritative_translation_language:document.getElementById('f-translation-lang').value,notebook_url:document.getElementById('f-notebook-url').value})});
    const data = await res.json();
    closeModal(); FilterRegistry.resetAll(); FilterRegistry.renderAll();
    currentSearch=''; document.getElementById('search').value='';
    justAddedId=data.id; await load(); showToast('Источник добавлен');
  });
}

function openEditSourceById(id) {
  const s = sourcesById[id];
  openModal('Редактировать источник', sourceFormHtml(s), async () => {
    await fetch(`${API}/sources/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({short_name:document.getElementById('f-short-name').value,citation:document.getElementById('f-citation').value,original_language:document.getElementById('f-lang').value,original_lost:document.getElementById('f-lost').checked,authoritative_translation_language:document.getElementById('f-translation-lang').value,notebook_url:document.getElementById('f-notebook-url').value,processed:s.processed,listened:s.listened})});
    closeModal(); load(); showToast('Источник обновлён');
  });
}

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

const searchInput=document.getElementById('search');
const searchClear=document.getElementById('search-clear');
searchInput.addEventListener('input',e=>{currentSearch=e.target.value;searchClear.classList.toggle('visible',currentSearch.length>0);renderSources();});
searchClear.addEventListener('click',()=>{searchInput.value='';currentSearch='';searchClear.classList.remove('visible');renderSources();searchInput.focus();});

document.getElementById('btn-burger').addEventListener('click',e=>{e.stopPropagation();document.getElementById('burger-menu').classList.toggle('open');});
document.addEventListener('click',e=>{const menu=document.getElementById('burger-menu');const btn=document.getElementById('btn-burger');if(menu.classList.contains('open')&&!menu.contains(e.target)&&e.target!==btn)menu.classList.remove('open');});
document.getElementById('btn-add-source').addEventListener('click',openAddSource);
document.getElementById('modal-cancel').addEventListener('click',closeModal);
document.getElementById('modal-close-x').addEventListener('click',closeModal);

document.getElementById('sources-list').addEventListener('click',e=>{
  const copyBtn=e.target.closest('.js-copy');
  if(copyBtn){const id=parseInt(copyBtn.dataset.id);const kind=copyBtn.dataset.kind;const s=sourcesById[id];let text='';if(kind==='citation')text=s.citation;else if(kind==='short_name')text=s.short_name;else if(kind==='prompt')text=PROMPT_TEXT;copyToClipboard(text,copyBtn);return;}
  const editBtn=e.target.closest('.js-edit');if(editBtn){openEditSourceById(parseInt(editBtn.dataset.id));return;}
  const notebookBtn=e.target.closest('.js-notebook');if(notebookBtn){openNotebookPrompt(parseInt(notebookBtn.dataset.id));return;}
  const deleteBtn=e.target.closest('.js-delete');if(deleteBtn){deleteSourceById(parseInt(deleteBtn.dataset.id));return;}
});

document.getElementById('sources-list').addEventListener('change',e=>{
  const toggle=e.target.closest('.js-toggle');
  if(toggle){const id=parseInt(toggle.dataset.id);const field=toggle.dataset.field;toggleField(id,field,toggle.checked);}
});

let dupCheckTimer=null;
async function runDuplicateCheck(citationText) {
  const warningBox=document.getElementById('dup-warning'); if(!warningBox)return;
  const text=(citationText||'').trim(); if(text.length<8){warningBox.classList.remove('visible');warningBox.innerHTML='';return;}
  try{const res=await fetch(`${API}/sources/check-duplicate`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({citation:text})});const data=await res.json();const matches=data.matches||[];
    if(matches.length===0){warningBox.classList.remove('visible');warningBox.innerHTML='';return;}
    warningBox.innerHTML=`<div class="dup-warning-title">⚠ Похоже на уже существующий источник:</div>${matches.map(m=>`<div class="dup-match"><span class="dup-match-score">${m.score}%</span><span class="dup-match-name">${escHtml(m.short_name)}</span><div class="dup-match-citation">${escHtml(m.citation)}</div></div>`).join('')}`;
    warningBox.classList.add('visible');
  }catch(err){console.error('Duplicate check failed',err);}
}
function attachDuplicateCheckListener(){const textarea=document.getElementById('f-citation');if(!textarea)return;const trigger=()=>{clearTimeout(dupCheckTimer);dupCheckTimer=setTimeout(()=>runDuplicateCheck(textarea.value),150);};textarea.addEventListener('paste',()=>setTimeout(trigger,30));textarea.addEventListener('input',trigger);}

async function setRating(id,value){const s=sourcesById[id];const newValue=(s.rating===value)?null:value;await fetch(`${API}/sources/${id}/rating`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({rating:newValue})});s.rating=newValue;renderSources();showToast(newValue?`Оценка: ${newValue}/10`:'Оценка снята');}

function openCommentEditor(id){const s=sourcesById[id];const row=document.getElementById(`bottom-row-${id}`);if(!row)return;row.innerHTML=`<div class="comment-edit-zone"><textarea class="comment-textarea js-comment-textarea" data-id="${id}">${escHtml(s.comment||'')}</textarea><div class="comment-actions"><button class="btn-comment-save js-comment-save" data-id="${id}">Сохранить</button>${s.comment?`<button class="btn-comment-delete js-comment-delete" data-id="${id}">Удалить</button>`:''}<button class="btn-comment-cancel js-comment-cancel" data-id="${id}">Отмена</button></div></div>`;const textarea=row.querySelector('.js-comment-textarea');textarea.focus();textarea.setSelectionRange(textarea.value.length,textarea.value.length);}

async function saveComment(id){const row=document.getElementById(`bottom-row-${id}`);const textarea=row.querySelector('.js-comment-textarea');const text=textarea.value.trim();await fetch(`${API}/sources/${id}/comment`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({comment:text})});sourcesById[id].comment=text;renderSources();showToast('Комментарий сохранён');}

async function deleteComment(id){await fetch(`${API}/sources/${id}/comment`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({comment:''})});sourcesById[id].comment='';renderSources();showToast('Комментарий удалён');}

function cancelCommentEdit(id){renderSources();}

document.getElementById('sources-list').addEventListener('click',(e)=>{
  const ratingBtn=e.target.closest('.js-rating');if(ratingBtn){setRating(parseInt(ratingBtn.dataset.id),parseInt(ratingBtn.dataset.value));return;}
  const commentOpen=e.target.closest('.js-comment-open');if(commentOpen){openCommentEditor(parseInt(commentOpen.dataset.id));return;}
  const commentSave=e.target.closest('.js-comment-save');if(commentSave){saveComment(parseInt(commentSave.dataset.id));return;}
  const commentDelete=e.target.closest('.js-comment-delete');if(commentDelete){deleteComment(parseInt(commentDelete.dataset.id));return;}
  const commentCancel=e.target.closest('.js-comment-cancel');if(commentCancel){cancelCommentEdit(parseInt(commentCancel.dataset.id));return;}
});

initSidebar();
load();
</script>
