<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Промты — Domains Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; font-size: 14px; }

  header { background: #1a1a1a; color: #fff; padding: 12px 20px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; }
  .header-inner { max-width: 1200px; margin: 0 auto; width: 100%; display: flex; align-items: center; gap: 14px; }
  header h1 { font-size: 14px; font-weight: 600; }
  .back-link { color: #bbb; text-decoration: none; font-size: 12.5px; padding: 6px 12px; border: 1px solid #3a3a3a; border-radius: 6px; }
  .back-link:hover { color: #fff; border-color: #555; }
  .btn-add { margin-left: auto; padding: 7px 14px; background: #2e7d32; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 12.5px; font-weight: 600; }
  .btn-add:hover { background: #256728; }

  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; }

  .table-wrap { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: #1a1a1a; color: #fff; }
  thead th { padding: 10px 12px; text-align: left; font-weight: 600; font-size: 12px; white-space: nowrap; }
  tbody tr { border-bottom: 1px solid #f0f0f0; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafaf8; }
  tbody td { padding: 9px 12px; vertical-align: middle; }

  .td-drag { width: 28px; cursor: grab; color: #ccc; font-size: 16px; user-select: none; }
  .td-drag:active { cursor: grabbing; }
  .td-num { width: 48px; color: #888; font-size: 12px; }
  .td-name { min-width: 160px; font-weight: 500; }
  .td-prompt { min-width: 300px; }
  .td-actions { width: 70px; white-space: nowrap; position: sticky; right: 0; background: #fff; box-shadow: -2px 0 4px rgba(0,0,0,0.06); }
  thead .td-actions { background: #1a1a1a; }
  tbody tr:hover .td-actions { background: #fafaf8; }

  .prompt-cell {
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 12px;
    color: #555;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 500px;
    display: block;
  }
  .prompt-cell:hover { color: #1a1a1a; }

  .btn-edit, .btn-delete { padding: 4px 9px; border-radius: 5px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 11.5px; color: #555; }
  .btn-edit:hover { background: #f0f0f0; }
  .btn-delete:hover { background: #ffebee; color: #c62828; border-color: #ffcdd2; }

  .empty-state { text-align: center; color: #aaa; padding: 60px; font-size: 13px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 10px; padding: 24px; width: 100%; max-width: 560px; box-shadow: 0 8px 40px rgba(0,0,0,0.18); }
  .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
  .modal-close { background: none; border: none; font-size: 20px; color: #aaa; cursor: pointer; }
  .modal-close:hover { color: #1a1a1a; }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; }
  .form-row input, .form-row textarea { width: 100%; padding: 8px 11px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: inherit; }
  .form-row input:focus, .form-row textarea:focus { outline: none; border-color: #1a1a1a; }
  .form-row textarea { resize: vertical; min-height: 120px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel { padding: 8px 18px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; color: #555; }
  .btn-cancel:hover { background: #f5f5f5; }
  .btn-save { padding: 8px 20px; background: #1a1a1a; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-save:hover { background: #333; }

  .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 300; align-items: center; justify-content: center; }
  .confirm-overlay.open { display: flex; }
  .confirm-box { background: #fff; border-radius: 10px; padding: 24px; width: 100%; max-width: 360px; box-shadow: 0 8px 40px rgba(0,0,0,0.18); }
  .confirm-box p { font-size: 14px; margin-bottom: 20px; color: #333; }
  .confirm-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-confirm-delete { padding: 8px 18px; background: #c62828; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-confirm-delete:hover { background: #b71c1c; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: #fff; padding: 10px 18px; border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity 0.2s; z-index: 400; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="back-link">← Назад</a>
    <h1>Промты</h1>
    <button class="btn-add" id="btn-add">+ Добавить</button>
  </div>
</header>

<div class="container">
  <div class="table-wrap">
    <table id="prompts-table">
      <thead>
        <tr>
          <th class="td-drag"></th>
          <th class="td-num">№</th>
          <th class="td-name">Название</th>
          <th class="td-prompt">Промт</th>
          <th class="td-actions">Действия</th>
        </tr>
      </thead>
      <tbody id="prompts-tbody"></tbody>
    </table>
    <div class="empty-state" id="empty-state">Нет промтов. Нажми «+ Добавить».</div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">
      <span id="modal-title">Добавить промт</span>
      <button class="modal-close" id="btn-modal-close">✕</button>
    </div>
    <div class="form-row">
      <label>Название</label>
      <input type="text" id="f-name" placeholder="Название промта">
    </div>
    <div class="form-row">
      <label>Промт</label>
      <textarea id="f-prompt" placeholder="Текст промта…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel">Отмена</button>
      <button class="btn-save" id="btn-save">Сохранить</button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <p>Удалить этот промт? Действие необратимо.</p>
    <div class="confirm-actions">
      <button class="btn-cancel" id="btn-confirm-cancel">Отмена</button>
      <button class="btn-confirm-delete" id="btn-confirm-delete">Удалить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:5051/api/prompts';
let rows = [];
let editId = null;
let deleteId = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadRows() {
  try {
    const res = await fetch(API);
    rows = await res.json();
    renderTable();
    initDragAndDrop();
  } catch(e) { showToast('Ошибка загрузки'); }
}

function renderTable() {
  const tbody = document.getElementById('prompts-tbody');
  const empty = document.getElementById('empty-state');
  if (rows.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  tbody.innerHTML = rows.map((r, i) => `
    <tr data-id="${r.id}">
      <td class="td-drag">⠿</td>
      <td class="td-num">${i + 1}</td>
      <td class="td-name">${escHtml(r.name)}</td>
      <td class="td-prompt"><span class="prompt-cell" data-id="${r.id}" title="Нажми чтобы скопировать">${escHtml(r.prompt)}</span></td>
      <td class="td-actions">
        <button class="btn-edit" data-id="${r.id}">✏️</button>
        <button class="btn-delete" data-id="${r.id}">🗑</button>
      </td>
    </tr>
  `).join('');
}

document.getElementById('prompts-tbody').addEventListener('click', e => {
  const promptCell = e.target.closest('.prompt-cell');
  if (promptCell) {
    const id = parseInt(promptCell.dataset.id);
    const r = rows.find(x => x.id === id);
    const text = r ? r.prompt : '';
    navigator.clipboard.writeText(text).then(() => showToast('Промт скопирован!'));
    return;
  }
  const editBtn = e.target.closest('.btn-edit');
  if (editBtn) { openEdit(parseInt(editBtn.dataset.id)); return; }
  const delBtn = e.target.closest('.btn-delete');
  if (delBtn) { openConfirmDelete(parseInt(delBtn.dataset.id)); }
});

function openModal() { document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); editId = null; }
function clearForm() { document.getElementById('f-name').value = ''; document.getElementById('f-prompt').value = ''; }

document.getElementById('btn-add').addEventListener('click', () => {
  clearForm();
  editId = null;
  document.getElementById('modal-title').textContent = 'Добавить промт';
  openModal();
});

function openEdit(id) {
  const r = rows.find(x => x.id === id);
  if (!r) return;
  editId = id;
  document.getElementById('modal-title').textContent = 'Редактировать промт';
  document.getElementById('f-name').value = r.name || '';
  document.getElementById('f-prompt').value = r.prompt || '';
  openModal();
}

document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('btn-modal-close').addEventListener('click', closeModal);

document.getElementById('btn-save').addEventListener('click', async () => {
  const payload = {
    name: document.getElementById('f-name').value.trim(),
    prompt: document.getElementById('f-prompt').value.trim()
  };
  if (!payload.name || !payload.prompt) { showToast('Заполни название и промт'); return; }
  try {
    if (editId) {
      await fetch(`${API}/${editId}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
      showToast('Промт обновлён');
    } else {
      await fetch(API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
      showToast('Промт добавлен');
    }
    closeModal();
    loadRows();
  } catch(e) { showToast('Ошибка сохранения'); }
});

function openConfirmDelete(id) { deleteId = id; document.getElementById('confirm-overlay').classList.add('open'); }
document.getElementById('btn-confirm-cancel').addEventListener('click', () => { document.getElementById('confirm-overlay').classList.remove('open'); deleteId = null; });
document.getElementById('btn-confirm-delete').addEventListener('click', async () => {
  if (!deleteId) return;
  try {
    await fetch(`${API}/${deleteId}`, { method: 'DELETE' });
    showToast('Промт удалён');
    document.getElementById('confirm-overlay').classList.remove('open');
    deleteId = null;
    loadRows();
  } catch(e) { showToast('Ошибка удаления'); }
});

let sortableInstance = null;

function initDragAndDrop() {
  const tbody = document.getElementById('prompts-tbody');
  if (sortableInstance) { sortableInstance.destroy(); sortableInstance = null; }
  sortableInstance = new Sortable(tbody, {
    handle: '.td-drag',
    animation: 150,
    ghostClass: 'dragging',
    onEnd: async () => {
      const allRows = [...tbody.querySelectorAll('tr[data-id]')];
      const order = allRows.map(r => parseInt(r.dataset.id));
      await fetch(`${API}/reorder`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ order })
      });
      loadRows();
    }
  });
}

loadRows();
</script>
</body>
</html>
